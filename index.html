<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fin de Prácticas de Paisajismo</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Libre+Baskerville:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Sol brillante -->
    <div class="sol"></div>

    <!-- Nubes flotantes -->
    <div class="nube nube1"></div>
    <div class="nube nube2"></div>

    <!-- Hojas cayendo -->
    <span class="hoja hoja1">🍃</span>
    <span class="hoja hoja2">🌿</span>
    <span class="hoja hoja3">🍃</span>
    <span class="hoja hoja4">🍂</span>

    <div class="container">
        <div class="icono-principal">🌳</div>
        <h1 class="fade-in">¡Fin de Prácticas!</h1>
        <p class="subtitulo fade-in">Paisajismo 🌱</p>
        <h2 class="fade-in">Cuenta atrás para el 27 de mayo de 2026 – 17:00</h2>
        <div id="countdown" class="fade-in">
            <div class="time-box">
                <span id="days">00</span>
                <p>Días</p>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <p>Horas</p>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <p>Minutos</p>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <p>Segundos</p>
            </div>
        </div>
    </div>

    <!-- Paisaje decorativo inferior -->
    <div class="paisaje">
        <div class="colina colina1"></div>
        <div class="colina colina2"></div>

        <div class="arbol arbol1">
            <div class="copa-t"></div><div class="copa-m"></div><div class="copa-b"></div>
            <div class="tronco"></div>
        </div>
        <div class="arbol arbol2">
            <div class="copa-t copa-t-s"></div><div class="copa-m copa-m-s"></div><div class="copa-b copa-b-s"></div>
            <div class="tronco"></div>
        </div>
        <div class="arbol arbol3">
            <div class="copa-t"></div><div class="copa-m"></div><div class="copa-b"></div>
            <div class="tronco"></div>
        </div>
        <div class="arbol arbol4">
            <div class="copa-t copa-t-s"></div><div class="copa-m copa-m-s"></div><div class="copa-b copa-b-s"></div>
            <div class="tronco"></div>
        </div>

        <span class="flor flor1">🌻</span>
        <span class="flor flor2">🌸</span>
        <span class="flor flor3">🌼</span>
        <span class="flor flor4">🌺</span>

        <div class="cesped"></div>
    </div>

    <footer>
        <div class="enlace">Creado por <a href="mailto:tatiana@villaema.es">Tatiana Villa</a> | &copy; 2026</div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
